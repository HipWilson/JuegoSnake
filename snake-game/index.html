<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Field Runner — Snake</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --grass-mid:   #1f5c38;
      --player:      #f5e642;
      --player-head: #ffffff;
      --accent:      #f5e642;
      --danger:      #e84040;
      --cell:        21px;
      --cols:        20;
      --rows:        20;
      --bg:          #0d1f14;
      --panel-bg:    #0b1a10;
      --text:        #d4f0dc;
      --muted:       #5a8f6a;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Barlow', sans-serif;
      overflow: hidden;
    }

    body::after {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 50%, transparent 40%, rgba(0,0,0,.65) 100%);
      pointer-events: none; z-index: 0;
    }

    #root { position: relative; z-index: 1; }

    .layout {
      display: flex;
      align-items: flex-start;
      gap: 18px;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 128px;
    }

    .panel {
      background: var(--panel-bg);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 6px;
      overflow: hidden;
    }

    .panel-header {
      background: var(--accent);
      color: #0b1a10;
      font-family: 'Bebas Neue', sans-serif;
      font-size: .95rem;
      letter-spacing: .18em;
      text-align: center;
      padding: 4px 0 2px;
    }

    .panel-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 9px 6px 7px;
      border-bottom: 1px solid rgba(255,255,255,.04);
    }
    .panel-row:last-child { border-bottom: none; }

    .panel-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .58rem;
      letter-spacing: .28em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .panel-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.5rem;
      line-height: 1;
      color: var(--accent);
      text-shadow: 0 0 14px rgba(245,230,66,.35);
      transition: transform .1s, color .1s;
    }
    .panel-value.bump {
      transform: scale(1.28);
      color: #fff;
      text-shadow: 0 0 20px #fff;
    }

    .level-content {
      padding: 8px 10px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }
    .level-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.15rem;
      color: var(--text);
      letter-spacing: .12em;
    }
    .pips { display: flex; gap: 5px; }
    .pip {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      transition: background .3s, box-shadow .3s;
    }
    .pip.on {
      background: var(--accent);
      box-shadow: 0 0 6px rgba(245,230,66,.55);
      border-color: var(--accent);
    }

    .controls-content {
      padding: 8px 8px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .key-row { display: flex; gap: 3px; justify-content: center; }
    .kbd {
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 3px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .62rem;
      color: var(--text);
      padding: 2px 5px;
      min-width: 22px;
      text-align: center;
    }
    .controls-sep {
      width: 80%;
      border: none;
      border-top: 1px solid rgba(255,255,255,.06);
      margin: 3px 0;
    }

    .main-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .game-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.5rem;
      letter-spacing: .35em;
      color: var(--accent);
      text-shadow: 0 2px 0 rgba(0,0,0,.5), 0 0 28px rgba(245,230,66,.28);
      line-height: 1;
      text-align: center;
    }
    .game-sub {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .62rem;
      letter-spacing: .38em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
      margin-top: 1px;
    }

    .board-wrap {
      position: relative;
      border-radius: 5px;
      overflow: hidden;
      box-shadow:
        0 0 0 2px rgba(255,255,255,.05),
        0 0 0 3px #000,
        0 8px 40px rgba(0,0,0,.55),
        0 0 70px rgba(30,80,50,.2);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(20, 21px);
      grid-template-rows:    repeat(20, 21px);
      width:  420px;
      height: 420px;
      background: var(--grass-mid);
      position: relative;
    }

    .field-svg {
      position: absolute; inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .cell {
      width: 21px; height: 21px;
      position: relative; z-index: 2;
    }

    .cell.snake {
      background: var(--player);
      border-radius: 4px;
      box-shadow: 0 0 5px rgba(245,230,66,.45);
      animation: popIn .07s ease;
    }
    .cell.snake-head {
      background: var(--player-head);
      border-radius: 5px;
      box-shadow: 0 0 12px rgba(255,255,255,.8), 0 0 4px var(--accent);
    }
    @keyframes popIn {
      from { transform: scale(.35); } to { transform: scale(1); }
    }

    .cell.food {
      z-index: 3;
      display: flex; align-items: center; justify-content: center;
    }
    .ball {
      width: 15px; height: 15px;
      animation: ballBounce .75s ease-in-out infinite alternate;
      filter: drop-shadow(0 0 5px rgba(255,255,255,.7));
    }
    @keyframes ballBounce {
      from { transform: scale(.85) translateY(2px); }
      to   { transform: scale(1.1) translateY(-2px); }
    }

    .overlay {
      position: absolute; inset: 0; z-index: 20;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 13px;
      background: rgba(8,20,12,.88);
      backdrop-filter: blur(4px);
      animation: fadeIn .25s ease;
    }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

    .ov-badge {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .58rem;
      letter-spacing: .45em;
      text-transform: uppercase;
      color: var(--muted);
      border: 1px solid rgba(255,255,255,.1);
      padding: 3px 16px;
      border-radius: 20px;
    }

    .ov-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3.2rem;
      letter-spacing: .18em;
      line-height: .95;
      text-align: center;
    }
    .ov-title.yellow { color: var(--accent); text-shadow: 0 0 28px rgba(245,230,66,.4); }
    .ov-title.red    { color: var(--danger); text-shadow: 0 0 28px rgba(232,64,64,.45); }

    .ov-info {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .78rem;
      letter-spacing: .18em;
      color: var(--text);
    }
    .ov-info em { color: var(--accent); font-style: normal; font-weight: 700; }

    .btn {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: .3em;
      padding: 9px 32px 7px;
      background: var(--accent);
      color: #0b1a10;
      border: none; border-radius: 3px;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(245,230,66,.3);
      transition: transform .15s, box-shadow .15s;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 7px 26px rgba(245,230,66,.5);
    }
    .btn:active { transform: translateY(0px); }

    .ticker {
      width: 420px;
      background: var(--accent);
      color: #0b1a10;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .64rem;
      font-weight: 700;
      letter-spacing: .22em;
      text-transform: uppercase;
      overflow: hidden;
      white-space: nowrap;
      padding: 3px 0;
    }
    .ticker-inner {
      display: inline-block;
      animation: scroll 22s linear infinite;
    }
    @keyframes scroll {
      from { transform: translateX(420px); }
      to   { transform: translateX(-100%); }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
  const { useState, useEffect, useCallback, useRef } = React;

  ReactDOM.createRoot(document.getElementById('root')).render(<div style={{color:'white'}}>Estructura lista ✅</div>);
</script>
</body>
</html>
